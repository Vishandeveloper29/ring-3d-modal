<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ring Collection — 3D Viewer</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Josefin+Sans:wght@100;200;300;400&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --gold: #c9a96e;
      --gold-light: #e8d5a3;
      --gold-glow: rgba(201, 169, 110, 0.13);
      --bg: #080705;
      --text: #f0e8d8;
      --text-muted: #7a6a54;
      --text-dim: #332a1a;
      --border: rgba(201, 169, 110, 0.13);
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 200;
      overflow: hidden;
    }

    /* Grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    }

    /* Full-screen viewer */
    model-viewer {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      --poster-color: transparent;
      z-index: 1;
    }

    /* Header */
    .hdr {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
      padding: 1.8rem 2.5rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(8, 7, 5, 0.88) 0%, transparent 100%);
    }

    .brand {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      font-size: 1.4rem;
      color: var(--gold);
      letter-spacing: .06em;
    }

    .brand-sub {
      font-size: .5rem;
      letter-spacing: .44em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 3px;
    }

    .hdr-ctr {
      font-size: .5rem;
      letter-spacing: .44em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* Ring info — bottom left */
    .rinfo {
      position: fixed;
      bottom: 0;
      left: 0;
      z-index: 20;
      padding: 0 2.5rem 2.8rem;
      pointer-events: none;
      background: linear-gradient(0deg, rgba(8, 7, 5, 0.86) 0%, transparent 100%);
      width: 46%;
      max-width: 500px;
      padding-top: 3rem;
    }

    .rname {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.8rem;
      font-weight: 300;
      line-height: 1.0;
      color: var(--text);
    }

    .rname em {
      display: block;
      font-style: italic;
      color: var(--gold);
      font-size: 2.1rem;
    }

    .rmat {
      margin-top: .55rem;
      font-size: .52rem;
      letter-spacing: .32em;
      text-transform: uppercase;
      color: rgba(201, 169, 110, .55);
    }

    .rdesc {
      margin-top: .8rem;
      font-size: .68rem;
      letter-spacing: .05em;
      line-height: 2;
      color: var(--text-muted);
      max-width: 360px;
    }

    /* Fade */
    .fade {
      transition: opacity .22s, transform .28s;
    }

    .fade.out {
      opacity: 0;
      transform: translateY(8px);
    }

    /* ARROWS */
    .arr {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      z-index: 20;
      width: 52px;
      height: 52px;
      background: rgba(8, 7, 5, 0.45);
      backdrop-filter: blur(6px);
      border: 0.5px solid var(--border);
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-family: inherit;
      transition: all .22s;
    }

    .arr:hover {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(8, 7, 5, 0.7);
      transform: translateY(-50%) scale(1.06);
    }

    .arr:active {
      transform: translateY(-50%) scale(0.95);
    }

    .arr.prev {
      left: 1.6rem;
    }

    .arr.next {
      right: 1.6rem;
    }

    .arr:disabled {
      opacity: .12;
      pointer-events: none;
    }

    /* Label beside arrows */
    .arr-label {
      position: fixed;
      top: 50%;
      z-index: 19;
      pointer-events: none;
      font-size: .46rem;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: var(--text-dim);
      transition: opacity .2s;
    }

    .arr-label.lbl-prev {
      left: calc(1.6rem + 64px);
      transform: translateY(-50%);
    }

    .arr-label.lbl-next {
      right: calc(1.6rem + 64px);
      transform: translateY(-50%);
      text-align: right;
    }

    /* DOTS */
    .pdots {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      gap: .55rem;
      align-items: center;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--text-dim);
      cursor: pointer;
      transition: all .25s;
    }

    .dot:hover {
      background: var(--text-muted);
    }

    .dot.on {
      background: var(--gold);
      width: 20px;
      border-radius: 2.5px;
    }

    /* Corner brackets */
    .corners {
      position: fixed;
      inset: 16px;
      z-index: 15;
      pointer-events: none;
    }

    .corners::before,
    .corners::after,
    .corners i::before,
    .corners i::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      border-style: solid;
      border-color: rgba(201, 169, 110, .18);
    }

    .corners::before {
      top: 0;
      left: 0;
      border-width: 1px 0 0 1px;
    }

    .corners::after {
      top: 0;
      right: 0;
      border-width: 1px 1px 0 0;
    }

    .corners i::before {
      bottom: 0;
      left: 0;
      border-width: 0 0 1px 1px;
    }

    .corners i::after {
      bottom: 0;
      right: 0;
      border-width: 0 1px 1px 0;
    }

    /* Auto-rotate btn */
    .ar-btn {
      position: fixed;
      bottom: 1.9rem;
      right: 2rem;
      z-index: 20;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: rgba(8, 7, 5, 0.45);
      backdrop-filter: blur(6px);
      border: 0.5px solid var(--border);
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all .2s;
      font-family: inherit;
    }

    .ar-btn:hover,
    .ar-btn.on {
      border-color: var(--gold);
      color: var(--gold);
    }

    .ar-btn.on {
      background: rgba(201, 169, 110, .07);
    }

    /* Drag hint */
    .drag-hint {
      position: fixed;
      bottom: 1.95rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: .46rem;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: var(--text-dim);
      z-index: 19;
      pointer-events: none;
      margin-top: 1.8rem;
    }

    /* Loading */
    .loader {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.3rem;
      background: var(--bg);
      transition: opacity .6s, visibility .6s;
    }

    .loader.gone {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .lring {
      width: 42px;
      height: 42px;
      border: 1px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 1.2s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .ltxt {
      font-size: .54rem;
      letter-spacing: .44em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
  </style>
</head>

<body>

  <div class="loader" id="loader">
    <div class="lring"></div>
    <div class="ltxt">Loading collection</div>
  </div>

  <div class="corners"><i></i></div>

  <model-viewer id="mv" src="rings_spaced.glb" alt="Jewellery collection" camera-controls auto-rotate
    rotation-per-second="14deg" environment-image="neutral" exposure="1.3" shadow-intensity="0.9" shadow-softness="0.85"
    interpolation-decay="80" min-camera-orbit="auto auto 0.07m" max-camera-orbit="auto auto 2m"></model-viewer>

  <!-- Header -->
  <div class="hdr">
    <div>
      <div class="brand">Lumière</div>
      <div class="brand-sub">Fine Jewellery — 3D Collection</div>
    </div>
    <div class="hdr-ctr fade" id="ctr">01 / 05</div>
  </div>

  <!-- Ring Info -->
  <div class="rinfo">
    <div class="rname fade" id="rn">Fantasy<em>Ring</em></div>
    <div class="rmat fade" id="rm">Gold · Crystal</div>
    <div class="rdesc fade" id="rd">An enchanting fantasy-inspired ring featuring ornate sculptural metalwork. Intricate
      gold torus forms cradle a luminous crystal centre stone.</div>
  </div>

  <!-- Nav Arrows -->
  <button class="arr prev" id="prevBtn" disabled>←</button>
  <button class="arr next" id="nextBtn">→</button>

  <!-- Dots -->
  <div class="pdots" id="pdots"></div>

  <!-- Auto-rotate -->
  <button class="ar-btn on" id="arBtn">↻</button>

  <script>
    const RINGS = [
      {
        name: 'Fantasy', em: 'Ring', mat: 'Gold · Crystal',
        desc: 'An enchanting fantasy-inspired ring featuring ornate sculptural metalwork. Intricate gold torus forms cradle a luminous crystal centre stone.',
        x: -1.2, y: 0.020, orbit: '0deg 80deg 0.19m'
      },
      {
        name: 'Gold Ring', em: 'Blue Crystal', mat: '18k Gold · Sapphire Crystal',
        desc: 'A bold cocktail ring in warm 18k gold set with a striking blue crystal. The architectural band and brilliant stone create an unmistakable statement of luxury.',
        x: -0.6, y: 0.000, orbit: '10deg 78deg 0.20m'
      },
      {
        name: 'Diamond Ring', em: 'Solitaire', mat: 'White Gold · Diamonds',
        desc: 'A modern diamond solitaire with micro-pavé gear-set band in cool white gold. The precision-cut centre stone sits elevated above an intricate sculptural band.',
        x: 0.0, y: 0.022, orbit: '0deg 75deg 0.19m'
      },
      {
        name: 'White Gold', em: 'Diamond Band', mat: 'White Gold · Pavé Diamonds · Gift Box',
        desc: 'A full pavé diamond eternity band presented in a sleek black lacquer gift box. Continuous diamond-set white gold — pure, infinite brilliance.',
        x: 0.6, y: 0.006, orbit: '22deg 65deg 0.35m'
      },
      {
        name: 'Diamond Ring', em: 'Heritage', mat: '18k Gold · Multi-Stone',
        desc: 'A sculptural heritage-inspired ring with flowing gold gallery work. Multiple faceted stones within intricate gold curves — architectural jewellery at its finest.',
        x: 1.2, y: 0.026, orbit: '5deg 78deg 0.19m'
      },
    ];

    let cur = 0, autoR = true, loaded = false;
    const mv = document.getElementById('mv');
    const loader = document.getElementById('loader');
    const arBtn = document.getElementById('arBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const pdots = document.getElementById('pdots');

    // Build dots
    RINGS.forEach((_, i) => {
      const d = document.createElement('div');
      d.className = 'dot' + (i === 0 ? ' on' : '');
      d.addEventListener('click', () => go(i));
      pdots.appendChild(d);
    });

    function focusRing(i) {
      const r = RINGS[i];
      mv.cameraTarget = `${r.x}m ${r.y}m 0m`;
      mv.cameraOrbit = r.orbit;
    }

    function updateUI(i) {
      const r = RINGS[i];
      ['rn', 'rm', 'rd', 'ctr'].forEach(id => document.getElementById(id).classList.add('out'));
      setTimeout(() => {
        document.getElementById('rn').innerHTML = `${r.name}<em>${r.em}</em>`;
        document.getElementById('rm').textContent = r.mat;
        document.getElementById('rd').textContent = r.desc;
        document.getElementById('ctr').textContent = `0${i + 1} / 0${RINGS.length}`;
        ['rn', 'rm', 'rd', 'ctr'].forEach(id => document.getElementById(id).classList.remove('out'));
      }, 210);
      document.querySelectorAll('.dot').forEach((d, j) => d.classList.toggle('on', j === i));
      prevBtn.disabled = (i === 0);
      nextBtn.disabled = (i === RINGS.length - 1);
    }

    function go(i) {
      if (i < 0 || i >= RINGS.length) return;
      cur = i;
      updateUI(i);
      if (loaded) focusRing(i);
    }

    mv.addEventListener('load', () => {
      loaded = true;
      setTimeout(() => { loader.classList.add('gone'); focusRing(0); }, 350);
    });

    mv.addEventListener('error', () => {
      loader.innerHTML = `<div style="text-align:center;padding:2rem;">
    <div style="font-size:.56rem;letter-spacing:.3em;text-transform:uppercase;color:#7a6a54;margin-bottom:.8rem;">Model not found</div>
    <div style="font-size:.72rem;line-height:2.3;color:var(--gold);">Place <strong style="color:var(--text)">rings_spaced.glb</strong><br>in the same folder as this HTML file.</div>
  </div>`;
    });

    prevBtn.addEventListener('click', () => go(cur - 1));
    nextBtn.addEventListener('click', () => go(cur + 1));

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(cur + 1);
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') go(cur - 1);
    });

    arBtn.addEventListener('click', () => {
      autoR = !autoR;
      autoR ? mv.setAttribute('auto-rotate', '') : mv.removeAttribute('auto-rotate');
      arBtn.classList.toggle('on', autoR);
    });

    // Swipe
    let tx = null;
    mv.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
    mv.addEventListener('touchend', e => {
      if (tx === null) return;
      const dx = e.changedTouches[0].clientX - tx;
      if (Math.abs(dx) > 50) go(dx < 0 ? cur + 1 : cur - 1);
      tx = null;
    }, { passive: true });
  </script>
</body>

</html>
